<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ميزانيتي الذكية</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            background: white; 
            max-width: 400px; 
            margin: 20px auto; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h1 { color: #2c3e50; font-size: 1.8em; margin-bottom: 20px; }
        
        /* صندوق الميزانية الإجمالية */
        .main-budget {
            background: #2ecc71;
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }

        /* تفاصيل المصاريف الثابتة */
        .info-box {
            background: #ecf0f1;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #34495e;
            text-align: right;
        }

        /* أزرار تسجيل المصاريف */
        .expense-title {
            text-align: right;
            font-weight: bold;
            color: #34495e;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-expense {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .btn-expense:hover { background: #2980b9; }
        .btn-expense:active { transform: scale(0.98); }
        
        /* زر إعادة التعيين */
        .btn-reset {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn-reset:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 ميزانيتي الذكية</h1>
    
    <div class="main-budget">
        المتبقي للمصاريف: <span id="current-budget">14500</span> دج
    </div>

    <div class="info-box">
        💡 <strong>توزيع الميزانية:</strong><br>
        • الميزانية الإجمالية: 16,000 دج<br>
        • اشتراك الإنترنت (تم خصمه): 1,500 دج<br>
        • متوسط المصروف اليومي المستهدف: 483 دج
    </div>

    <div class="expense-title">👇 اضغط على الزر عند الصرف لتحديث الميزانية:</div>
    
    <div class="btn-group">
        <button class="btn-expense" onclick="deductExpense(110)">
            <span>🍳 فطور الصباح</span>
            <strong>- 110 دج</strong>
        </button>
        
        <button class="btn-expense" onclick="deductExpense(180)">
            <span>☕ مصروف القهوة (قهوة+ماء+عصير)</span>
            <strong>- 180 دج</strong>
        </button>
        
        <button class="btn-expense" onclick="deductExpense(190)">
            <span>🍽️ وجبة العشاء</span>
            <strong>- 190 دج</strong>
        </button>
    </div>

    <button class="btn-reset" onclick="resetBudget()">إعادة تعيين الميزانية للشهر الجديد</button>
</div>

<script>
    // تخزين الميزانية في متصفح الهاتف لكي لا تختفي عند تحديث الصفحة
    let budget = localStorage.getItem('my_budget') ? parseInt(localStorage.getItem('my_budget')) : 14500;
    document.getElementById('current-budget').innerText = budget;

    // دالة خصم المصاريف
    function deductExpense(amount) {
        if (budget >= amount) {
            budget -= amount;
            localStorage.setItem('my_budget', budget);
            document.getElementById('current-budget').innerText = budget;
        } else {
            alert("⚠️ الميزانية المتبقية لا تكفي لهذا المصروف!");
        }
    }

    // دالة إعادة التعيين
    function resetBudget() {
        if (confirm("هل تريد فعلاً إعادة تعيين الميزانية إلى 14,500 دج؟")) {
            budget = 14500;
            localStorage.setItem('my_budget', budget);
            document.getElementById('current-budget').innerText = budget;
        }
    }
</script>

</body>
</html>
