<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ميزانيتي الذكية</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            text-align: center; 
            padding: 15px; 
            margin: 0;
        }
        .container { 
            background: white; 
            max-width: 400px; 
            margin: 10px auto; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h1 { color: #2c3e50; font-size: 1.6em; margin-bottom: 15px; }
        
        .main-budget {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .daily-budget {
            background: #e67e22;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .info-box {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #34495e;
            text-align: right;
            line-height: 1.4;
        }

        .expense-title {
            text-align: right;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 10px;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .btn-expense {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        
        .btn-expense:active { transform: scale(0.98); }

        /* تنسيق خانة المصروف الخارجي الجديد */
        .custom-expense-box {
            background: #f9f9f9;
            border: 2px dashed #bdc3c7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .input-amount {
            flex: 1;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 1em;
            text-align: center;
        }
        
        .btn-add-custom {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-add-custom:active { transform: scale(0.95); }
        
        .btn-reset {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 ميزانيتي الذكية (دورة يوم 18)</h1>
    
    <div class="main-budget">
        المتبقي للشهر الحالي: <span id="total-budget">14500</span> دج
    </div>

    <div class="daily-budget">
        ميزانية اليوم المتبقية: <span id="daily-budget">483</span> دج
    </div>

    <div class="info-box">
        📅 <strong>دورة الحساب:</strong> من 18 في الشهر إلى 17 من الشهر القادم.<br>
        💡 يتم تجديد الـ 483 دج تلقائياً كل صباح، وتتجدد الميزانية الكبرى تلقائياً كل يوم 18.
    </div>

    <div class="custom-expense-box">
        <div class="expense-title" style="margin: 0;">🚨 مصروف خارجي / اضطراري جديد:</div>
        <div class="input-row">
            <input type="number" id="custom-amount" class="input-amount" placeholder="أدخل المبلغ هنا (دج)" min="1">
            <button class="btn-add-custom" onclick="deductCustomExpense()">خصم الآن</button>
        </div>
    </div>

    <div class="expense-title">👇 أو سجل المصاريف اليومية الثابتة:</div>
    
    <div class="btn-group">
        <button class="btn-expense" onclick="deductExpense(110)">
            <span>🍳 فطور الصباح</span>
            <strong>- 110 دج</strong>
        </button>
        
        <button class="btn-expense" onclick="deductExpense(180)">
            <span>☕ قهوة + ماء + ع
