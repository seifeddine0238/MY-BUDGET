<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانيتي الذكية</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            text-align: center; 
            padding: 15px; 
            margin: 0;
        }
        .container { 
            background: white; 
            max-width: 400px; 
            margin: 10px auto; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h1 { color: #2c3e50; font-size: 1.6em; margin-bottom: 15px; }
        
        .main-budget {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .daily-budget {
            background: #e67e22;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .info-box {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #34495e;
            text-align: right;
            line-height: 1.4;
        }

        .expense-title {
            text-align: right;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 10px;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .btn-expense {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        
        .btn-expense:active { transform: scale(0.98); }
        
        .btn-reset {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 ميزانيتي الذكية (دورة يوم 18)</h1>
    
    <div class="main-budget">
        المتبقي للشهر الحالي: <span id="total-budget">14500</span> دج
    </div>

    <div class="daily-budget">
        ميزانية اليوم المتبقية: <span id="daily-budget">483</span> دج
    </div>

    <div class="info-box">
        📅 <strong>دورة الحساب:</strong> من 18 في الشهر إلى 17 من الشهر القادم.<br>
        💡 يتم تجديد الـ 483 دج تلقائياً كل صباح، وتتجدد الميزانية الكبرى تلقائياً كل يوم 18.
    </div>

    <div class="expense-title">👇 سجل مصروفك اليوم فوراً:</div>
    
    <div class="btn-group">
        <button class="btn-expense" onclick="deductExpense(110)">
            <span>🍳 فطور الصباح</span>
            <strong>- 110 دج</strong>
        </button>
        
        <button class="btn-expense" onclick="deductExpense(180)">
            <span>☕ قهوة + ماء + عصير</span>
            <strong>- 180 دج</strong>
        </button>
        
        <button class="btn-expense" onclick="deductExpense(190)">
            <span>🍽️ وجبة العشاء</span>
            <strong>- 190 دج</strong>
        </button>
    </div>

    <button class="btn-reset" onclick="manualReset()">إعادة تعيين يدوي اضطراري</button>
</div>

<script>
    const TOTAL_START = 14500;
    const DAILY_START = 483;
    const START_DAY = 18;

    let totalBudget = localStorage.getItem('total_budget') ? parseInt(localStorage.getItem('total_budget')) : TOTAL_START;
    let dailyBudget = localStorage.getItem('daily_budget') ? parseInt(localStorage.getItem('daily_budget')) : DAILY_START;
    let lastResetMonth = localStorage.getItem('last_reset_month') ? parseInt(localStorage.getItem('last_reset_month')) : -1;
    let lastActiveDate = localStorage.getItem('last_active_date') ? new Date(localStorage.getItem('last_active_date')) : new Date();

    if(!localStorage.getItem('last_active_date')) localStorage.setItem('last_active_date', lastActiveDate);

    function checkDateUpdates() {
        let now = new Date();
        let currentMonth = now.getMonth();
        let currentDay = now.getDate();

        if (currentDay >= START_DAY && lastResetMonth !== currentMonth) {
            totalBudget = TOTAL_START;
            dailyBudget = DAILY_START;
            lastResetMonth = currentMonth;
            localStorage.setItem('last_reset_month', lastResetMonth);
        }
        if (lastResetMonth === -1) {
            lastResetMonth = (currentDay >= START_DAY) ? currentMonth : (currentMonth - 1 + 12) % 12;
            localStorage.setItem('last_reset_month', lastResetMonth);
        }

        if (now.getDate() !== lastActiveDate.getDate() || now.getMonth() !== lastActiveDate.getMonth()) {
            dailyBudget = DAILY_START;
            lastActiveDate = now;
            localStorage.setItem('last_active_date', lastActiveDate.toISOString());
        }

        document.getElementById('total-budget').innerText = totalBudget;
        document.getElementById('daily-budget').innerText = dailyBudget;
        
        localStorage.setItem('total_budget', totalBudget);
        localStorage.setItem('daily_budget', dailyBudget);
    }

    function deductExpense(amount) {
        checkDateUpdates();
        if (dailyBudget >= amount && totalBudget >= amount) {
            dailyBudget -= amount;
            totalBudget -= amount;
            localStorage.setItem('total_budget', totalBudget);
            localStorage.setItem('daily_budget', dailyBudget);
            document.getElementById('total-budget').innerText = totalBudget;
            document.getElementById('daily-budget').innerText = dailyBudget;
        } else {
            alert("⚠️ الميزانية المتبقية لا تكفي!");
        }
    }

    function manualReset() {
        if (confirm("هل تريد تصفير الحساب والبدء من جديد بـ 14,500 دج فوراً؟")) {
            localStorage.clear();
            totalBudget = TOTAL_START;
            dailyBudget = DAILY_START;
            lastResetMonth = new Date().getMonth();
            lastActiveDate = new Date();
            localStorage.setItem('last_reset_month', lastResetMonth);
            localStorage.setItem('last_active_date', lastActiveDate.toISOString());
            checkDateUpdates();
        }
    }

    checkDateUpdates();

    // كود تشغيل وتفعيل حفظ البيانات بدون إنترنت في الهاتف
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("تطبيق الميزانية جاهز للعمل بدون إنترنت!"));
    }
</script>

</body>
</html>
